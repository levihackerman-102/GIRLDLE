<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GIRLDLE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <div class="glass-card login-box">
            <h1>Login</h1>
            <p style="margin-bottom: 1rem; color: var(--text-dim);">Enter your credentials to join the game.</p>
            {% if error %}
            <p style="color: var(--error); margin-bottom: 1rem;">{{ error }}</p>
            {% endif %}
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" style="width: 100%; margin-top: 10px;">Enter Game</button>
            </form>
        </div>
    </div>
</body>

</html>
